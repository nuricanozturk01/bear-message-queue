spring:
  application:
    name: bearmq-broker
  datasource:
    url: ${DB_URL:jdbc:h2:file:/app/data/bearmq;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=FALSE;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    show-sql: false
    open-in-view: false
    generate-ddl: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        globally_quoted_identifiers: true
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration/{vendor}
    schemas: public
    default-schema: public

server:
  port: ${SERVER_PORT:3333}

logging:
  level:
    root: warn

bearmq:
  domain: ${BEARMQ_DOMAIN:localhost:6667}
  admin:
    initial-password: ${BEARMQ_ADMIN_INITIAL_PASSWORD:}
  broker:
    storage-dir: ${BEARMQ_STORAGE_DIR:/app/data/queues}
  security:
    jwt:
      secret: "${BEARMQ_SECURITY_JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}"
      access-token-expiration-minutes: 30
      refresh-token-expiration-days: 7
    cors:
      allowed-origins: ${BEARMQ_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3333}
  server:
    broker:
      port: ${BEARMQ_BROKER_TCP_PORT:6667}
      backlog: 1024
      dequeue-wait-ms: 500
    metrics:
      enabled: false
      port: 6668

h2:
  tcp-server:
    enabled: ${H2_TCP_SERVER_ENABLED:false}
    port: ${H2_TCP_SERVER_PORT:9092}
